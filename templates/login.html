{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card border-0 shadow-lg form-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="icon-circle bg-success-light text-success mb-3 mx-auto">
                        <i class="fas fa-user-lock fa-2x"></i>
                    </div>
                    <h2 class="fw-bold" data-i18n="login_title">Welcome Back</h2>
                    <p class="text-muted" data-i18n="login_subtitle">Sign in to access price predictions</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3 form-floating">
                        <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                        <label for="email" data-i18n-label="login_email"><i class="fas fa-envelope me-2 text-muted"></i>Email address</label>
                    </div>
                    
                    <div class="mb-4 form-floating">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password" data-i18n-label="login_password"><i class="fas fa-lock me-2 text-muted"></i>Password</label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg fw-bold rounded-pill text-white shadow-sm btn-scale" data-i18n="login_btn">
                            Sign In
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="mb-0 text-muted">
                        <span data-i18n="login_no_account">Don't have an account?</span>
                        <a href="{{ url_for('register') }}" class="text-success fw-bold text-decoration-none hover-underline" data-i18n="login_create">Create an account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
